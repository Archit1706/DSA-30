<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <style>
      .box { fill: #fff; stroke: #333; stroke-width: 1; }
      .char { font-family: monospace; font-size: 20px; text-anchor: middle; dominant-baseline: middle; }
      .match { fill: #dcfce7; }
      .mismatch { fill: #fee2e2; }
      .label { font-family: sans-serif; font-size: 14px; fill: #666; }
    </style>
  </defs>

  <text x="20" y="40" class="label">Text:</text>
  <!-- Text: A B C A B C A B D -->
  <rect x="80" y="20" width="40" height="40" class="box" /><text x="100" y="40" class="char">A</text>
  <rect x="120" y="20" width="40" height="40" class="box" /><text x="140" y="40" class="char">B</text>
  <rect x="160" y="20" width="40" height="40" class="box" /><text x="180" y="40" class="char">C</text>
  <rect x="200" y="20" width="40" height="40" class="box match" /><text x="220" y="40" class="char">A</text>
  <rect x="240" y="20" width="40" height="40" class="box match" /><text x="260" y="40" class="char">B</text>
  <rect x="280" y="20" width="40" height="40" class="box match" /><text x="300" y="40" class="char">C</text>
  <rect x="320" y="20" width="40" height="40" class="box mismatch" /><text x="340" y="40" class="char">A</text>
  <rect x="360" y="20" width="40" height="40" class="box" /><text x="380" y="40" class="char">B</text>
  <rect x="400" y="20" width="40" height="40" class="box" /><text x="420" y="40" class="char">D</text>

  <text x="20" y="100" class="label">Pattern:</text>
  <!-- Pattern: A B C A B D (shifted) -->
  <!-- At index 3 -->
  <rect x="200" y="80" width="40" height="40" class="box match" /><text x="220" y="100" class="char">A</text>
  <rect x="240" y="80" width="40" height="40" class="box match" /><text x="260" y="100" class="char">B</text>
  <rect x="280" y="80" width="40" height="40" class="box match" /><text x="300" y="100" class="char">C</text>
  <rect x="320" y="80" width="40" height="40" class="box mismatch" /><text x="340" y="100" class="char">D</text>
  
  <!-- Connection lines -->
  <line x1="220" y1="60" x2="220" y2="80" stroke="#16a34a" stroke-width="2" />
  <line x1="260" y1="60" x2="260" y2="80" stroke="#16a34a" stroke-width="2" />
  <line x1="300" y1="60" x2="300" y2="80" stroke="#16a34a" stroke-width="2" />
  <line x1="340" y1="60" x2="340" y2="80" stroke="#dc2626" stroke-width="2" />
  
  <text x="360" y="100" class="label" style="fill: #dc2626;">Mismatch!</text>
  <text x="180" y="150" class="label">Shift pattern based on LPS array (Jump to LPS[2])</text>
</svg>
