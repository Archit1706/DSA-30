<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150">
  <defs>
    <style>
      .box { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .text { font-family: monospace; font-size: 24px; text-anchor: middle; dominant-baseline: middle; fill: #15803d; }
      .index { font-family: sans-serif; font-size: 14px; text-anchor: middle; fill: #6b7280; }
      .label { font-family: sans-serif; font-size: 16px; fill: #374151; font-weight: bold; }
    </style>
  </defs>
  
  <rect x="50" y="50" width="50" height="50" class="box" />
  <text x="75" y="75" class="text">H</text>
  <text x="75" y="115" class="index">0</text>
  
  <rect x="100" y="50" width="50" height="50" class="box" />
  <text x="125" y="75" class="text">E</text>
  <text x="125" y="115" class="index">1</text>
  
  <rect x="150" y="50" width="50" height="50" class="box" />
  <text x="175" y="75" class="text">L</text>
  <text x="175" y="115" class="index">2</text>
  
  <rect x="200" y="50" width="50" height="50" class="box" />
  <text x="225" y="75" class="text">L</text>
  <text x="225" y="115" class="index">3</text>
  
  <rect x="250" y="50" width="50" height="50" class="box" />
  <text x="275" y="75" class="text">O</text>
  <text x="275" y="115" class="index">4</text>
  
  <rect x="300" y="50" width="50" height="50" class="box" style="stroke: #dc2626; fill: #fef2f2;" />
  <text x="325" y="75" class="text" style="fill: #dc2626;">\0</text>
  <text x="325" y="115" class="index">5</text>
  
  <text x="50" y="30" class="label">Memory Layout (char[])</text>
  <text x="310" y="30" class="label" style="fill: #dc2626; font-size: 12px;">Null Terminator</text>
</svg>
