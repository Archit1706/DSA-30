<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <style>
      .box { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .code { font-family: monospace; font-size: 18px; fill: #1e40af; }
      .arrow { stroke: #6b7280; stroke-width: 2; marker-end: url(#arrowhead); }
      .label { font-family: sans-serif; font-size: 14px; fill: #4b5563; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280" />
    </marker>
  </defs>

  <!-- Step 1 -->
  <text x="50" y="40" class="code">s = "Hello"</text>
  
  <rect x="180" y="20" width="100" height="40" class="box" />
  <text x="230" y="45" class="code" text-anchor="middle">"Hello"</text>
  
  <!-- Step 2 -->
  <text x="50" y="120" class="code">s += " World"</text>
  
  <rect x="180" y="100" width="180" height="40" class="box" style="stroke: #16a34a; fill: #f0fdf4;" />
  <text x="270" y="125" class="code" text-anchor="middle" style="fill: #15803d;">"Hello World"</text>

  <!-- Pointers -->
  <text x="120" y="80" class="label" style="font-weight:bold; font-size: 16px;">s</text>
  
  <!-- Arrow to old -->
  <path d="M 130 75 Q 150 40 175 40" class="arrow" style="stroke-dasharray: 4;" />
  
  <!-- Arrow to new -->
  <path d="M 130 85 Q 150 120 175 120" class="arrow" style="stroke-width: 3; stroke: #16a34a;" />
  
  <!-- X mark on old link -->
  <line x1="145" y1="50" x2="165" y2="60" stroke="#dc2626" stroke-width="3" />
  <line x1="165" y1="50" x2="145" y2="60" stroke="#dc2626" stroke-width="3" />

  <text x="300" y="45" class="label" style="fill: #dc2626;">(Orphaned)</text>
  <text x="380" y="125" class="label" style="fill: #15803d;">(New Object)</text>
</svg>
