<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150">
  <defs>
    <style>
      .box { fill: #fff; stroke: #333; stroke-width: 1; }
      .char { font-family: monospace; font-size: 20px; text-anchor: middle; dominant-baseline: middle; }
      .match { fill: #dcfce7; }
      .pointer { stroke: #16a34a; stroke-width: 2; marker-end: url(#arrow); }
      .label { font-family: sans-serif; font-size: 14px; fill: #16a34a; font-weight: bold; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>

  <rect x="50" y="50" width="50" height="50" class="box match" /><text x="75" y="75" class="char">R</text>
  <rect x="100" y="50" width="50" height="50" class="box" /><text x="125" y="75" class="char">A</text>
  <rect x="150" y="50" width="50" height="50" class="box" /><text x="175" y="75" class="char">C</text>
  <rect x="200" y="50" width="50" height="50" class="box" /><text x="225" y="75" class="char">E</text>
  <rect x="250" y="50" width="50" height="50" class="box" /><text x="275" y="75" class="char">C</text>
  <rect x="300" y="50" width="50" height="50" class="box" /><text x="325" y="75" class="char">A</text>
  <rect x="350" y="50" width="50" height="50" class="box match" /><text x="375" y="75" class="char">R</text>
  
  <!-- Left Pointer -->
  <line x1="75" y1="120" x2="75" y2="105" class="pointer" />
  <text x="75" y="135" class="label" text-anchor="middle">Left</text>
  <path d="M 85 125 L 105 125" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Right Pointer -->
  <line x1="375" y1="120" x2="375" y2="105" class="pointer" />
  <text x="375" y="135" class="label" text-anchor="middle">Right</text>
  <path d="M 365 125 L 345 125" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)" />
  
  <text x="225" y="30" class="label" style="fill: #333; font-size: 16px;">Two Pointers Approach</text>
</svg>
